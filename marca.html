<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Missão KBD - Marca</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="marcas">
  <!-- Cabeçalho simples com botão voltar e título da marca -->
  <header class="appBar">
    <button class="iconBtn" onclick="voltarHome()" aria-label="Voltar">←</button>
    <div class="appBarTitle" id="marcaTitulo">Marca</div>
    <div class="appBarRight">
      <div class="chip" id="topbarSetor">---</div>
    </div>
  </header>

  <div class="container appContent">
    <div class="lista" id="listaKbds"></div>
  </div>

  <!-- Barra de navegação inferior -->
  <nav class="bottomNav" aria-label="Navegação">
    <button class="navItem" data-nav="home"><span class="navIcon">🏠</span><span>Home</span></button>
    <button class="navItem" data-nav="marcas"><span class="navIcon">📚</span><span>Marcas</span></button>
    <button class="navItem" data-nav="quiz"><span class="navIcon">📝</span><span>Quiz</span></button>
  </nav>

  <script src="app.js"></script>
  <script>
    renderMarca();
    document.getElementById('topbarSetor').textContent = getSetor();
    if (typeof initBottomNav === 'function') {
      initBottomNav('marcas');
    }
  </script>
</body>
</html>
