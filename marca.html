<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Missão KBD • Marca</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body onload="renderMarca()">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="app-shell">

    <header class="topbar topbar-minimal">
      <div class="topbar-left">
        <button id="topbarBack" class="icon-button" type="button" aria-label="Voltar"></button>
      </div>
      <div class="topbar-right">
        <span id="topbarSetor" class="setor-badge">—</span>
      </div>
    </header>

    <main class="main-content">

      <section class="summary-card" style="margin:16px 16px 0;">
        <div class="summary-card-top">
          <div>
            <div id="marcaSummaryLabel" class="summary-card-label">Setor</div>
            <div id="marcaSummaryValue" class="summary-card-value">0%</div>
          </div>
          <div class="summary-card-icon">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
        </div>
        <div class="progress-track">
          <div id="marcaSummaryTrack" class="progress-fill" style="width:0%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
          <p id="marcaSummaryCopy" class="helper-text">Carregando...</p>
          <span id="marcaSummaryChip" class="summary-chip pending">0/0</span>
        </div>
      </section>

      <section class="section-head">
        <h2 class="section-title">KBDs</h2>
        <p class="section-subtitle">Abra um conteúdo para estudar e responder o quiz.</p>
      </section>

      <section id="listaKbds" class="kbd-list"></section>

    </main>
  </div>
</body>
</html>
