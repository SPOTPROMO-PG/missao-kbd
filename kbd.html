<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KBD - Aula</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="kbd">
  <header class="appbar">
    <div class="appbarLeft">
      <button class="iconBtn" aria-label="Voltar" onclick="goBack()">←</button>
      <img class="appbarLogo" src="logo-missao-kbd.png" alt="Missão KBD" />
      <div class="appbarTitle" id="appTitle">Aula</div>
    </div>
    <div class="appbarRight">
      <div class="chip" id="topbarSetor">---</div>
      <button class="iconBtn" aria-label="Menu" onclick="toggleDrawer(true)">☰</button>
    </div>
  </header>

  <div class="drawerOverlay" id="drawer" onclick="toggleDrawer(false)">
    <div class="drawerPanel" onclick="event.stopPropagation()">
      <div class="drawerHeader">
        <div class="drawerTitle">Menu</div>
        <button class="iconBtn" aria-label="Fechar" onclick="toggleDrawer(false)">✕</button>
      </div>
      <div class="drawerList" id="drawerList"></div>
    </div>
  </div>

  <main class="container">
    <section class="kbdHeader fadeUp">
      <div class="kbdHeaderTop">
        <div class="kbdBrandIcon" id="kbdBrandIcon">K</div>
        <div style="min-width:0;">
          <div class="kbdHeaderTitle" id="kbdTitulo">KBD</div>
          <div class="kbdHeaderSub">Aula prática</div>
        </div>
      </div>

      <label class="small" for="kbdSelect" style="color: rgba(255,255,255,.9); margin-top: 10px; display:block;">Mudar KBD</label>
      <select id="kbdSelect" class="select"></select>
    </section>

    <div class="segTabs fadeUp" style="margin-top: 14px;">
      <button class="segTab" id="tabTudo" onclick="setKbdView('all')">Tudo</button>
      <button class="segTab" id="tabVideos" onclick="setKbdView('videos')">Vídeos</button>
      <button class="segTab" id="tabFotos" onclick="setKbdView('fotos')">Fotos</button>
    </div>

    <section class="mediaCard fadeUp" id="videoCard">
      <div class="mediaFrame" id="videoFrameWrap">
        <iframe id="videoFrame" allowfullscreen></iframe>
      </div>
      <div class="mediaInfo" id="videoInfo">
        🎬 <strong id="videoTitle">Vídeo</strong>
        <span style="margin-left:auto"></span>
        <a id="videoLink" target="_blank" rel="noopener">Abrir no YouTube</a>
      </div>
    </section>

    <section id="fotosArea" class="fadeUp"></section>

    <button class="ctaBtn fadeUp" onclick="irParaQuiz()">Responder o quiz</button>

    <div class="tipCard fadeUp">
      <div class="tipTitle">💡 Como aproveitar melhor</div>
      <div class="tipText">• Assista ao vídeo com atenção (pausando se necessário) <br>• Observe os detalhes das imagens <br>• Faça o quiz para testar seus conhecimentos</div>
    </div>
  </main>

  <nav class="bottomNav" aria-label="Navegação">
    <div class="bottomNavInner">
      <button class="navItem" data-nav="home" onclick="navHome()"><span class="navIcon">🏠</span><span>Home</span></button>
      <button class="navItem" data-nav="marcas" onclick="navMarcas()"><span class="navIcon">🏷️</span><span>Marcas</span></button>
      <button class="navItem" data-nav="quiz" onclick="navQuizHub()"><span class="navIcon">📝</span><span>Quiz</span></button>
    </div>
  </nav>

  <script src="quizzes.js"></script>
  <script src="app.js"></script>
  <script>
    initShell();
    renderKbdV2();
  </script>
</body>
</html>
