<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aula - Missão KBD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="kbd">
  <!-- Barra superior com voltar, título do KBD e setor -->
  <header class="appBar">
    <button class="iconBtn" onclick="voltarMarca()" aria-label="Voltar">←</button>
    <div class="appBarTitle" id="kbdHeaderTitle">KBD</div>
    <div class="appBarRight">
      <div class="chip" id="kbdSetorBadge">---</div>
    </div>
  </header>

  <main class="container appContent">
    <!-- Nome do KBD e marca -->
    <div class="pageHeader">
      <div>
        <div class="formTitle" id="kbdTitle">KBD</div>
        <div class="formSubtitle" id="marcaNome">Marca</div>
      </div>
    </div>

    <!-- Vídeo -->
    <div class="mediaSection">
      <div class="videoBox">
        <div id="videoPlaceholder" class="videoPlaceholder">
          🎬 Vídeo em breve
          <div class="small">Enquanto isso, veja as imagens abaixo</div>
        </div>
        <iframe id="videoFrame" allowfullscreen></iframe>
      </div>
    </div>

    <!-- Imagens -->
    <div class="mediaSection">
      <div id="imagensKbd" class="imageRow"></div>
    </div>

    <!-- Botão para responder o quiz -->
    <button class="btnPrimaryForm" onclick="irParaQuiz()">Responder o Quiz</button>
  </main>

  <!-- Barra de navegação inferior -->
  <nav class="bottomNav" aria-label="Navegação">
    <button class="navItem" data-nav="home"><span class="navIcon">🏠</span><span>Home</span></button>
    <button class="navItem" data-nav="marcas"><span class="navIcon">📚</span><span>Marcas</span></button>
    <button class="navItem" data-nav="quiz"><span class="navIcon">📝</span><span>Quiz</span></button>
  </nav>

  <script src="app.js"></script>
  <script>
    // Renderiza os dados do KBD atual
    renderKbd();
    // Atualiza cabeçalho e setor
    (function() {
      const params = new URLSearchParams(window.location.search);
      const marcaId = params.get("marca");
      const kbdId = params.get("kbd");
      const marca = CONTENT.marcas.find(m => m.id === marcaId);
      const kbd = marca ? (marca.kbds || []).find(k => k.id === kbdId) : null;
      if (marca && kbd) {
        document.getElementById("kbdHeaderTitle").textContent = kbd.nome;
        document.getElementById("kbdTitle").textContent = kbd.nome;
        document.getElementById("marcaNome").textContent = marca.nome;
      }
      document.getElementById('kbdSetorBadge').textContent = getSetor();
      if (typeof initBottomNav === 'function') {
        initBottomNav('marcas');
      }
    })();
  </script>
</body>
</html>
