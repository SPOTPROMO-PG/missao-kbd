<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>KBD - Aula</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="top">
      <div>
        <button class="btnSmall" onclick="voltarMarca()">← Voltar</button>
        <div class="small" id="kbdMeta" style="margin-top: 10px;">KBD</div>
        <h1 id="kbdTitulo" style="margin-top: 6px;">Nome do KBD</h1>
      </div>

      <div class="setorBox">
        <div class="small">SETOR</div>
        <div id="setorBadge" class="badge">---</div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="small" style="margin: 6px 0 10px; font-weight: 800; opacity: .9;">VÍDEO</div>
    <div class="videoBox">
      <div id="videoPlaceholder" class="videoPlaceholder">
        🎬 Vídeo em breve
        <div class="small">Enquanto isso, veja as imagens abaixo</div>
      </div>

      <iframe
        id="videoFrame"
        allowfullscreen>
      </iframe>
    </div>

    <!-- IMAGENS -->
    <div class="small" style="margin: 18px 0 10px; font-weight: 800; opacity: .9;">IMAGEM</div>
    <div id="imagensKbd" class="imageRow"></div>

    <!-- BOTÃO QUIZ -->
    <button class="btnPrimary" onclick="irParaQuiz()">
      RESPONDER O QUIZ
    </button>

  </div>

  <script src="app.js"></script>
  <script>
    renderKbd();
  </script>
</body>
</html>
