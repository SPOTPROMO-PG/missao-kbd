<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>KBD - Aula</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body data-page="marcas" onload="renderKbd(); initBottomNav();">
  <div class="bg-glow"></div>
  <div class="app">
    <div class="topbar">
      <div class="topbar-left">
        <button class="back" onclick="voltarMarca()">←</button>
        <div class="brand">
          <div class="small">Aula / KBD</div>
          <div class="title" id="kbdTitulo">—</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="badge" id="topbarSetor">—</div>
        <button class="btn-mini" onclick="trocarSetor()">Setor</button>
      </div>
    </div>

    <div class="container">
      <div id="kbdStatus" class="kbd-status pending">⏳ Pendente</div>

      <div class="card" style="margin-top:12px">
        <div class="card-title">Vídeo</div>
        <div class="video-box">
          <iframe id="videoFrame" style="display:none"></iframe>
          <div id="videoPlaceholder" class="placeholder">Vídeo em breve</div>
        </div>
      </div>

      <div class="card" style="margin-top:12px">
        <div class="card-title">Execução (referência)</div>
        <div id="imagensKbd" class="images"></div>
      </div>

      <div style="height:12px"></div>
      <button class="btn" onclick="irParaQuiz()">Responder o Quiz</button>
    </div>

    <nav class="bottomNav">
      <div class="wrap">
        <a href="#" data-target="home">Home</a>
        <a href="#" data-target="marcas">Marcas</a>
        <a href="#" data-target="quiz">Quiz</a>
      </div>
    </nav>
  </div>
</body>
</html>
