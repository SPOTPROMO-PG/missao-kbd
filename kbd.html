<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KBD - Aula</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="kbd">
  <div class="container">

    <div class="top">
      <div>
        <!-- Botão de voltar compacto com apenas a seta -->
        <button class="btnSmall" onclick="voltarMarca()">←</button>
        <h1 id="kbdTitulo">KBD</h1>
        <!-- Subtítulo removido para uma experiência mais limpa -->
        <p class="small" id="marcaNome"></p>
      </div>

      <div class="setorBox">
        <div class="small">SETOR</div>
        <div id="setorBadge" class="badge">---</div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="videoBox">
      <div id="videoPlaceholder" class="videoPlaceholder">
        🎬 Vídeo em breve
        <div class="small">Enquanto isso, veja as imagens abaixo</div>
      </div>

      <iframe
        id="videoFrame"
        allowfullscreen>
      </iframe>
    </div>

    <!-- IMAGENS -->
    <div id="imagensKbd" class="imageRow"></div>

    <!-- BOTÃO QUIZ -->
    <button class="btnPrimary" onclick="irParaQuiz()">
      QUERO RESPONDER O QUIZ
    </button>

  </div>

  <script src="app.js"></script>
  <script>
    renderKbd();
    // Preenche o subtítulo com o nome da marca
    const urlParams = new URLSearchParams(window.location.search);
    const marcaId = urlParams.get('marca');
    const marca = CONTENT.marcas.find(m => m.id === marcaId);
    const kbdSubtitulo = document.getElementById('marcaNome');
    if (marca && kbdSubtitulo) {
      kbdSubtitulo.textContent = marca.nome || '';
    }
    // Mostra o setor atual no badge
    const setorBadge = document.getElementById('setorBadge');
    if (setorBadge) {
      setorBadge.textContent = getSetor();
    }
  </script>

  <!-- Barra de navegação inferior -->
  <nav class="bottomNav">
    <a href="home.html" data-target="home">
      <span class="icon">🏠</span>
      Home
    </a>
    <a href="home.html" data-target="marcas">
      <span class="icon">🏷️</span>
      Marcas
    </a>
    <a href="quiz.html" data-target="quiz">
      <span class="icon">🧠</span>
      Quiz
    </a>
  </nav>
  <script>
    if (typeof initBottomNav === 'function') {
      initBottomNav();
    }
  </script>
</body>
</html>
