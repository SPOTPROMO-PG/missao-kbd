<!DOCTYPE html>

</head>
<body data-page="marcas">

    <button class="iconBtn" id="navBack" aria-label="Voltar">←</button>
    <div class="appBarTitle">Missão KBD</div>

      <div class="chip" id="navSetor">---</div>
      <button class="iconBtn" onclick="openMenu()" aria-label="Menu">☰</button>
    </div>
  </header>

  <main class="container appContent">
    <div class="pageHeader">
      <div>
        <div class="formTitle">Escolha uma marca</div>
        <div class="formSubtitle">Toque em uma marca para ver os KBDs</div>
      </div>
    </div>

    <div class="lista" id="listaMarcas"></div>

  <nav class="bottomNav" aria-label="Navegação">
    <button class="navItem" data-nav="home">
      <svg class="navIconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <path d="M9 11h6M9 15h6M7 3h10a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V5a2 2 0 0 1 2-2z"/>

      <span>Quiz</span>

  </nav>

  <script src="app.js"></script>
  <script>
    renderHome();
    initNav('marcas');
