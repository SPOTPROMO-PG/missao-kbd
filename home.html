<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home - Missão KBD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="home">
  <header class="appbar">
    <div class="appbarLeft">
      <button class="iconBtn" id="btnBack" aria-label="Voltar" onclick="goBack()">←</button>
      <img class="appbarLogo" src="logo-missao-kbd.png" alt="Missão KBD" />
      <div class="appbarTitle">Missão KBD</div>
    </div>
    <div class="appbarRight">
      <div class="chip" id="topbarSetor">---</div>
      <button class="iconBtn" id="btnMenu" aria-label="Menu" onclick="toggleDrawer(true)">☰</button>
    </div>
  </header>

  <div class="drawerOverlay" id="drawer" onclick="toggleDrawer(false)">
    <div class="drawerPanel" onclick="event.stopPropagation()">
      <div class="drawerHeader">
        <div class="drawerTitle">Menu</div>
        <button class="iconBtn" aria-label="Fechar" onclick="toggleDrawer(false)">✕</button>
      </div>
      <div class="drawerList" id="drawerList"></div>
    </div>
  </div>

  <main class="container">
    <section class="hero fadeUp" id="hero">
      <div class="heroTitle">Missão KBD</div>
      <div class="heroSub">Aprenda tudo sobre nossas marcas e torne-se um especialista</div>
      <div class="heroBadge">✨ <span id="heroStats">- marcas • Vídeos • Quizzes</span></div>
    </section>

    <div class="sectionTitle"><span class="sectionBar"></span>Escolha uma marca</div>

    <section class="brandGrid fadeUp" id="listaMarcas"></section>
  </main>

  <nav class="bottomNav" aria-label="Navegação">
    <div class="bottomNavInner">
      <button class="navItem" data-nav="home" onclick="navHome()"><span class="navIcon">🏠</span><span>Home</span></button>
      <button class="navItem" data-nav="marcas" onclick="navMarcas()"><span class="navIcon">🏷️</span><span>Marcas</span></button>
      <button class="navItem" data-nav="quiz" onclick="navQuizHub()"><span class="navIcon">📝</span><span>Quiz</span></button>
    </div>
  </nav>

  <script src="quizzes.js"></script>
  <script src="app.js"></script>
  <script>
    initShell();
    renderHomeV2();
  </script>
</body>
</html>
