<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Missão KBD - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="login">

  <div class="loginWrap">
    <div class="loginCard">
      <img src="logo-missao-kbd.png" alt="Missão KBD" class="loginLogo" />
      <h1 class="loginTitle">Bem-vindo!</h1>
      <p class="loginSubtitle">Digite seu <strong>SETOR</strong> para começar</p>

      <div class="field">
        <label class="fieldLabel" for="setor">Setor</label>
        <input id="setor" class="input" placeholder="Ex: SPI200" autocomplete="off" />
      </div>

      <button class="btnPrimary" onclick="entrar()">Entrar</button>
      <p class="small" style="text-align:center; margin-top:10px;">Dica: use o mesmo padrão do catálogo (ex.: SPI200).</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
