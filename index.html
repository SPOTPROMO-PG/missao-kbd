<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Missão KBD - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="padding-top: 22px;">
    <div style="text-align:center; margin-bottom: 18px;">
      <img src="logo-missao-kbd.png" alt="Missão KBD" style="width: 100%; max-width: 300px;">
    </div>

    <div class="hero" style="background: linear-gradient(135deg, var(--secondary) 0%, var(--pink) 100%);">
      <div class="heroTitle" style="text-align:center;">Bem-vindo!</div>
      <div class="heroSub" style="text-align:center;">Digite seu <strong>SETOR</strong> para começar</div>
    </div>

    <div style="margin-top: 14px;">
      <label class="small" for="setor">SETOR</label>
      <input id="setor" placeholder="Ex: SPI200" autocomplete="off" />
      <button class="btn" onclick="entrar()">Entrar</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
