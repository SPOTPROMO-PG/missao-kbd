<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Missão KBD - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login">

  <div class="loginWrap">
    <div class="loginCard">
      <div class="loginHeader">
        <img src="logo-missao-kbd.png" alt="Missão KBD" class="loginLogo">
        <div class="loginTitle">Bem-vindo ao Missão KBD</div>
        <div class="loginSubtitle">Digite seu <strong>SETOR</strong> para iniciar o treinamento</div>
      </div>

      <input id="setor" class="roundInput" placeholder="Ex: SPI200" autocomplete="off" inputmode="text">

      <button class="roundBtn" onclick="entrar()">Entrar</button>

      <div class="helperRow" aria-label="Ações rápidas">
        <button class="pillBtn" onclick="document.getElementById('setor').focus()">🔎 Focar</button>
        <button class="pillBtn" onclick="document.getElementById('setor').value=''; document.getElementById('setor').focus()">🧹 Limpar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
