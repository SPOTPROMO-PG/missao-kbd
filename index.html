<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Missão KBD • Login</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#000"/>
      <rect x="20" y="8" width="80" height="64" rx="12" fill="#1c1c1e"/>
      <rect x="30" y="16" width="60" height="20" rx="6" fill="#2c2c2e"/>
      <rect x="30" y="44" width="60" height="10" rx="4" fill="#2c2c2e"/>
      <rect x="30" y="58" width="60" height="8" rx="4" fill="#34c759"/>
    </svg>
  </template>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <main class="login-page">
    <section class="login-panel">

      <div class="login-logo">
        <img src="logo-missao-kbd-v2.png" alt="Logo Missão KBD">
      </div>

      <div class="login-head">
        <h1 class="login-title">Missão KBD</h1>
        <p class="login-subtitle">Insira seu código de setor para acessar os treinamentos.</p>
      </div>

      <div class="form-stack">
        <label class="field-label" for="setor">Código do setor</label>
        <input
          id="setor"
          class="input"
          type="text"
          placeholder="Ex.: RS234 ou SPI107"
          autocomplete="off"
          maxlength="24"
          spellcheck="false"
          autocapitalize="characters"
        >
      </div>

      <button class="primary-button" onclick="entrar()">Entrar</button>

    </section>
  </main>
</body>
</html>
