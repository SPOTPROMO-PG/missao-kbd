<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Missão KBD • Login</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <main class="login-page">
    <section class="login-panel">
      <div class="login-brand">
        <div class="login-logo-badge">🏁</div>
        <div class="login-head">
          <h1 class="login-title">Missão KBD</h1>
          <p class="login-subtitle">Acesse o app com o código do seu setor para visualizar as marcas, aulas e quizzes.</p>
        </div>
      </div>
      <div class="login-logo"><img src="logo-missao-kbd-v2.png" alt="Logo Missão KBD"></div>
      <div class="form-stack">
        <label class="field-label" for="setor">Código do setor</label>
        <input id="setor" class="input" type="text" placeholder="Ex.: SPI200" autocomplete="off" maxlength="12">
        <div class="helper-row">
          <span id="loginHelper" class="helper-text">Use um dos setores liberados para entrar.</span>
          <span class="login-sector-pill">SPI200 • RS234 • PR87 • SC01</span>
        </div>
      </div>
      <button class="primary-button" onclick="entrar()">Entrar no app</button>
    </section>
  </main>
</body>
</html>
