<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz - Missão KBD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="quiz-form" data-page="quiz">

  <header class="appBar">
    <button class="iconBtn" id="navBack" aria-label="Voltar">←</button>
    <div class="appBarTitle" id="quizTitulo">Quiz</div>
    <div class="appBarRight">
      <div class="chip" id="navSetor">---</div>
      <button class="iconBtn" onclick="openMenu()" aria-label="Menu">☰</button>
    </div>
  </header>

  <main class="container appContent">
    <div class="pageHeader" style="gap:10px; align-items:stretch;">
      <div style="flex:1;">
        <div class="formTitle" id="quizTitulo2">Quiz</div>
        <div class="formSubtitle" id="quizSubtitulo">Acompanhe seu progresso</div>
      </div>

      <div class="kbdSwitcher" id="kbdSwitchWrap" style="display:none;">
        <label class="small" for="quizKbdSelect" style="opacity:.85;">Mudar KBD</label>
        <select id="quizKbdSelect" class="select"></select>
      </div>
    </div>

    <div class="progressWrap" aria-label="Progresso do quiz">
      <div class="progressBar" id="quizProgressBar"></div>
    </div>

    <div id="quizArea"></div>
  </main>

  <nav class="bottomNav" aria-label="Navegação">
    <button class="navItem" data-nav="home">
      <svg class="navIconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="navItem" data-nav="marcas">
      <svg class="navIconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/>
      </svg>
      <span>Marcas</span>
    </button>
    <button class="navItem" data-nav="quiz">
      <svg class="navIconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11h6M9 15h6M7 3h10a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V5a2 2 0 0 1 2-2z"/>
      </svg>
      <span>Quiz</span>
    </button>
  </nav>

  <script src="quizzes.js"></script>
  <script src="app.js"></script>
  <script>
    // mostra/oculta seletor de KBD dependendo da URL
    (function(){
      const p = new URLSearchParams(window.location.search);
      const has = p.get('marca') && p.get('kbd');
      document.getElementById('kbdSwitchWrap').style.display = has ? 'block' : 'none';
      // titulo duplicado (appBar + header)
      document.getElementById('quizTitulo2').textContent = document.getElementById('quizTitulo').textContent;
    })();

    renderQuiz();
    initNav('quiz');
  </script>
</body>
</html>
