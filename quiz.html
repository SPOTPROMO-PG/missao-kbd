<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz - Missão KBD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="quiz-form" data-page="quiz">
  <!-- Barra superior -->
  <header class="appBar">
    <button class="iconBtn" onclick="voltarMarca()" aria-label="Voltar">←</button>
    <div class="appBarTitle" id="quizHeaderTitle">Quiz</div>
    <div class="appBarRight">
      <div class="chip" id="quizSetorBadge">---</div>
    </div>
  </header>

  <main class="container appContent">
    <div class="pageHeader" style="gap:10px; align-items:stretch;">
      <div style="flex:1;">
        <div class="formTitle" id="quizTitulo">Quiz</div>
        <div class="formSubtitle" id="quizSubtitulo">Teste seus conhecimentos</div>
      </div>
    </div>

    <!-- Barra de progresso -->
    <div class="progressWrap" aria-label="Progresso do quiz">
      <div class="progressBar" id="quizProgressBar"></div>
    </div>

    <!-- Área do quiz: perguntas, opções e resultados serão renderizados aqui -->
    <div id="quizArea"></div>
  </main>

  <!-- Barra de navegação inferior -->
  <nav class="bottomNav" aria-label="Navegação">
    <button class="navItem" data-nav="home"><span class="navIcon">🏠</span><span>Home</span></button>
    <button class="navItem" data-nav="marcas"><span class="navIcon">📚</span><span>Marcas</span></button>
    <button class="navItem" data-nav="quiz"><span class="navIcon">📝</span><span>Quiz</span></button>
  </nav>

  <script src="quizzes.js"></script>
  <script src="app.js"></script>
  <script>
    // Atualiza cabeçalho e setor
    (function() {
      document.getElementById('quizSetorBadge').textContent = getSetor();
      renderQuiz();
      if (typeof initBottomNav === 'function') {
        initBottomNav('quiz');
      }
    })();
  </script>
</body>
</html>
