<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz - Missão KBD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="quiz">
  <header class="appbar">
    <div class="appbarLeft">
      <button class="iconBtn" aria-label="Voltar" onclick="goBack()">←</button>
      <img class="appbarLogo" src="logo-missao-kbd.png" alt="Missão KBD" />
      <div class="appbarTitle" id="appTitle">Quiz</div>
    </div>
    <div class="appbarRight">
      <div class="chip" id="topbarSetor">---</div>
      <button class="iconBtn" aria-label="Menu" onclick="toggleDrawer(true)">☰</button>
    </div>
  </header>

  <div class="drawerOverlay" id="drawer" onclick="toggleDrawer(false)">
    <div class="drawerPanel" onclick="event.stopPropagation()">
      <div class="drawerHeader">
        <div class="drawerTitle">Menu</div>
        <button class="iconBtn" aria-label="Fechar" onclick="toggleDrawer(false)">✕</button>
      </div>
      <div class="drawerList" id="drawerList"></div>
    </div>
  </div>

  <main class="container">
    <section class="quizShell fadeUp">
      <div class="quizShellTop">
        <div>
          <div class="quizTitle" id="quizTitulo">Quiz</div>
          <div class="small" style="color: rgba(255,255,255,.92);" id="quizSubtitulo">Teste seus conhecimentos</div>
        </div>
        <div class="quizPill" id="quizPill">0/0</div>
      </div>
      <div class="progressWrap" aria-label="Progresso">
        <div class="progressBar" id="quizProgress"></div>
      </div>

      <label class="small" for="quizKbdSelect" style="color: rgba(255,255,255,.9); margin-top: 12px; display:block;">Mudar KBD</label>
      <select id="quizKbdSelect" class="select"></select>
    </section>

    <div id="quizArea" class="fadeUp"></div>
  </main>

  <nav class="bottomNav" aria-label="Navegação">
    <div class="bottomNavInner">
      <button class="navItem" data-nav="home" onclick="navHome()"><span class="navIcon">🏠</span><span>Home</span></button>
      <button class="navItem" data-nav="marcas" onclick="navMarcas()"><span class="navIcon">🏷️</span><span>Marcas</span></button>
      <button class="navItem" data-nav="quiz" onclick="navQuizHub()"><span class="navIcon">📝</span><span>Quiz</span></button>
    </div>
  </nav>

  <script src="quizzes.js"></script>
  <script src="app.js"></script>
  <script>
    initShell();
    renderQuizV2();
  </script>
</body>
</html>
