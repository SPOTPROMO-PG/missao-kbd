<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz - Missão KBD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="quiz-form" data-page="quiz">

  <header class="appBar">
    <button class="iconBtn" id="navBack" aria-label="Voltar">←</button>
    <div class="appBarTitle" id="appTitle">Quiz</div>
    <div class="appBarRight">
      <div class="chip" id="navSetor">---</div>
      <button class="iconBtn" id="navMenu" aria-label="Menu">☰</button>
    </div>
  </header>

  <main class="container appContent">
    <div class="pageHeader" style="gap:10px; align-items:stretch;">
      <div style="flex:1;">
        <div class="formTitle" id="quizTitulo">Quiz</div>
        <div class="formSubtitle" id="quizSubtitulo">Teste seus conhecimentos</div>
      </div>

      <div class="kbdSwitcher">
        <label class="small" for="quizKbdSelect" style="opacity:.85;">Mudar KBD</label>
        <select id="quizKbdSelect" class="select"></select>
      </div>
    </div>

    <div class="progressWrap" aria-label="Progresso do quiz">
      <div class="progressBar" id="quizProgressBar"></div>
    </div>

    <div class="inlineActions">
      <button class="btnGhost" onclick="navToKbdAtual()">← Ver Aula</button>
      <button class="btnGhost" onclick="navToKbdAtual('videos')">🎬 Vídeo</button>
      <button class="btnGhost" onclick="navToKbdAtual('fotos')">🖼️ Fotos</button>
    </div>

    <div id="quizArea"></div>

    <button class="btnGhost" onclick="voltarMarca()" style="width:100%; margin-top: 14px;">
      ← Voltar para lista de KBDs
    </button>
  </main>

  <nav class="bottomNav" aria-label="Navegação">
    <button class="navItem" data-nav="home"><span class="navIcon">🏠</span><span>Home</span></button>
    <button class="navItem" data-nav="kbd"><span class="navIcon">📚</span><span>Aula</span></button>
    <button class="navItem" data-nav="quiz"><span class="navIcon">📝</span><span>Quiz</span></button>
    <button class="navItem" data-nav="fotos"><span class="navIcon">🖼️</span><span>Fotos</span></button>
    <button class="navItem" data-nav="videos"><span class="navIcon">🎬</span><span>Vídeos</span></button>
  </nav>

  <script src="quizzes.js"></script>
  <script src="app.js"></script>
  <script>
    renderQuiz();
  </script>
</body>
</html>
